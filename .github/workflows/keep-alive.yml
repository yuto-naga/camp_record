name: Keep Supabase Alive

on:
  schedule:
    # Runs at 00:00 UTC on Sunday and Thursday (every 3-4 days)
    - cron: '0 0 * * 0,4'
  workflow_dispatch: # Allows manually running the workflow from GitHub Actions tab

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase API
        run: |
          curl -fS -X POST "${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}/rest/v1/keep_alive_logs" \
            -H "apikey: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{}'
